<!DOCTYPE html>
<html>
<head>
    <title>Slot Machine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-size: 24px; }
        button { font-size: 24px; padding: 15px 30px; }
        input { font-size: 24px; padding: 10px; }
    </style>
</head>
<body>
    <h1>🎰 Slot Machine 🎰</h1>
    <p id="result"></p>
    <p id="balance"></p>

    <div id="start-screen">
        <input id="balance-entry" type="number" placeholder="Enter balance...">
        <button onclick="startGame()">Start Game</button>
    </div>

    <div id="game-screen" style="display:none">
        <input id="bet-entry" type="number" placeholder="Enter bet...">
        <button onclick="spin()">Spin!</button>
        <button onclick="cashout()">Cash Out</button>
    </div>

    <div id="retry-screen" style="display:none">
        <button onclick="retry()">Retry</button>
    </div>

    <button onclick="window.location.href='index.html'">Back to Casino</button>

    <script>
        let balance = 0;
        const symbols = ["7", "🍒", "🔔", "⭐", "🍉"];

        function spinRow() {
            return [symbols[Math.floor(Math.random() * symbols.length)],
                    symbols[Math.floor(Math.random() * symbols.length)],
                    symbols[Math.floor(Math.random() * symbols.length)]];
        }

        function getPayout(row, bet) {
            if (row[0] === row[1] && row[1] === row[2]) {
                if (row[0] === "7")  return bet * 25;
                if (row[0] === "🍒") return bet * 10;
                if (row[0] === "🔔") return bet * 5;
                if (row[0] === "⭐") return bet * 3;
                if (row[0] === "🍉") return bet * 2;
            }
            if (row[0] === row[1] || row[1] === row[2] || row[0] === row[2]) {
                let match = row[0] === row[1] ? row[0] : row[1] === row[2] ? row[1] : row[0];
                if (match === "7")  return bet * 15;
                if (match === "🍒") return bet * 7;
                if (match === "🔔") return bet * 3;
                if (match === "⭐") return bet * 1.5;
                if (match === "🍉") return bet * 1;
            }
            return 0;
        }

        function startGame() {
            balance = parseInt(document.getElementById("balance-entry").value);
            if (isNaN(balance)) {
                document.getElementById("result").innerText = "Enter a valid number!";
                return;
            }
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("game-screen").style.display = "block";
            document.getElementById("balance").innerText = "Balance: $" + balance;
        }

        function spin() {
            let bet = parseInt(document.getElementById("bet-entry").value);
            if (isNaN(bet)) {
                document.getElementById("result").innerText = "Enter a valid bet!";
                return;
            }
            if (bet > balance) {
                document.getElementById("result").innerText = "Not enough money!";
                return;
            }
            if (bet < 1) {
                document.getElementById("result").innerText = "Bet at least $1!";
                return;
            }

            balance -= bet;
            let row = spinRow();
            let payout = getPayout(row, bet);
            balance += payout;

            let resultText = row.join(" | ");
            if (payout > 0) {
                document.getElementById("result").innerText = resultText + "\n🎉 You won $" + payout + "!";
            } else {
                document.getElementById("result").innerText = resultText + "\nYou lost.";
            }

            document.getElementById("balance").innerText = "Balance: $" + balance;

            if (balance <= 0) {
                setTimeout(() => {
                    document.getElementById("result").innerText = "Game over! You're broke.";
                    document.getElementById("game-screen").style.display = "none";
                    document.getElementById("retry-screen").style.display = "block";
                }, 2000);
            }
        }

        function cashout() {
            document.getElementById("result").innerText = "You cashed out with $" + balance + "!";
            document.getElementById("game-screen").style.display = "none";
            document.getElementById("retry-screen").style.display = "block";
        }

        function retry() {
            balance = 0;
            document.getElementById("result").innerText = "";
            document.getElementById("balance").innerText = "";
            document.getElementById("balance-entry").value = "";
            document.getElementById("bet-entry").value = "";
            document.getElementById("retry-screen").style.display = "none";
            document.getElementById("game-screen").style.display = "none";
            document.getElementById("start-screen").style.display = "block";
        }
    </script>
</body>
</html>
